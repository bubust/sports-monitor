services:
  - type: web
    name: sports-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: python app.py
    plan: free
    envVars:
      - key: SPORTS_USER
        sync: false
      - key: SPORTS_PASS
        sync: false
      - key: SPORTS_TOTP
        sync: false
      - key: PORT
        value: 10000
