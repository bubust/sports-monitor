services:
  - type: web
    name: sports-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --worker-class gthread --threads 2
    plan: free
    envVars:
      - key: SPORTS_USER
        sync: false
      - key: SPORTS_PASS
        sync: false
      - key: SPORTS_TOTP
        sync: false
      - key: PORT
        value: 10000
