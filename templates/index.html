<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>足球策略訊號</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0f1117;
  --card:   #1a1d27;
  --card2:  #20243280;
  --border: #2a2d3a;
  --text:   #e2e8f0;
  --muted:  #64748b;
  --green:  #22c55e;
  --yellow: #f59e0b;
  --red:    #ef4444;
  --blue:   #3b82f6;
}
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
       font-size: 14px; min-height: 100vh; overflow-x: hidden; }

/* ── Header ── */
.header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 10;
}
.header h1 { font-size: 16px; font-weight: 700; color: var(--blue); }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot-err { background: var(--red);   box-shadow: 0 0 6px var(--red); }
.dot-spin { background: var(--yellow); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.updated { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }
.btn-refresh {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.btn-refresh:hover { border-color: var(--blue); color: var(--blue); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px; padding: 20px;
}

/* ── Card ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 10px;
  cursor: pointer; transition: border-color .15s, transform .1s;
}
.card:hover { border-color: var(--blue); transform: translateY(-2px); }
.card-head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-name { font-size: 15px; font-weight: 700; }
.signal-badge {
  margin-left: auto; font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
}
.has-signal   { background: rgba(34,197,94,.18); color: var(--green); }
.no-signal    { background: var(--border); color: var(--muted); }

/* ── 預測勝率 badge ── */
.pred-badge {
  font-size: 13px; font-weight: 800; padding: 3px 10px;
  border-radius: 20px; display: flex; align-items: center; gap: 4px;
}
.pred-high { background: rgba(34,197,94,.15);  color: var(--green);  border: 1px solid rgba(34,197,94,.3); }
.pred-mid  { background: rgba(245,158,11,.15); color: var(--yellow); border: 1px solid rgba(245,158,11,.3); }
.pred-low  { background: rgba(239,68,68,.12);  color: var(--red);    border: 1px solid rgba(239,68,68,.3); }
.pred-none { background: var(--border); color: var(--muted); border: 1px solid var(--border); font-size:11px; }
.pred-max  { font-size: 10px; opacity: .75; }
.card-divider { border: none; border-top: 1px solid var(--border); }

/* ── 訊號列表 ── */
.signal-list { display: flex; flex-direction: column; gap: 6px; }
.signal-item {
  background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2);
  border-radius: 6px; padding: 8px 10px;
}
.signal-item.warn {
  background: rgba(245,158,11,.08); border-color: rgba(245,158,11,.2);
}
.signal-rec  { font-size: 13px; font-weight: 600; color: var(--green); }
.signal-item.warn .signal-rec { color: var(--yellow); }
.signal-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.winrate     { display: inline-block; font-size: 12px; font-weight: 700; margin-left: 6px; }
.wr-high { color: var(--green); }
.wr-mid  { color: var(--yellow); }
.wr-low  { color: var(--red); }

.no-signal-msg { color: var(--muted); font-size: 12px; text-align: center; padding: 8px 0; }
.card-footer   { font-size: 11px; color: var(--muted); }
.error-msg     { color: var(--red); font-size: 12px; }
.empty { text-align: center; color: var(--muted); padding: 60px 20px; }
.empty p { margin-top: 8px; font-size: 13px; }

/* ── Detail Panel (drawer from right) ── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 100; backdrop-filter: blur(2px);
}
.overlay.open { display: block; }

.drawer {
  position: fixed; top: 0; right: -100%; width: min(720px, 100vw);
  height: 100vh; background: #12151f; border-left: 1px solid var(--border);
  z-index: 101; transition: right .25s ease; display: flex; flex-direction: column;
  overflow: hidden;
}
.drawer.open { right: 0; }

.drawer-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  background: var(--card);
}
.drawer-title { font-size: 17px; font-weight: 700; }
.drawer-close {
  margin-left: auto; background: none; border: none; color: var(--muted);
  font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px;
}
.drawer-close:hover { color: var(--text); }

.drawer-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

/* ── Stat bar ── */
.stat-row { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 18px; text-align: center; flex: 1; min-width: 90px;
}
.stat-num { font-size: 24px; font-weight: 800; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── Section block ── */
.section-block { display: flex; flex-direction: column; gap: 8px; }
.section-title { font-size: 13px; font-weight: 700; color: var(--blue); padding-bottom: 4px;
                 border-bottom: 1px solid var(--border); }

/* ── Table ── */
.tbl-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: #1e2233; color: var(--muted); padding: 8px 10px;
  text-align: left; white-space: nowrap; font-weight: 600;
}
tbody tr { border-top: 1px solid var(--border); transition: background .1s; }
tbody tr:hover { background: rgba(255,255,255,.03); }
tbody td { padding: 8px 10px; vertical-align: top; }

tr.row-success { background: rgba(34,197,94,.06); }
tr.row-warning { background: rgba(245,158,11,.06); }
tr.row-danger  { background: rgba(239,68,68,.06); }

td.rec-success { color: var(--green); font-weight: 600; }
td.rec-warning { color: var(--yellow); font-weight: 600; }
td.rec-danger  { color: var(--red); font-weight: 600; }

/* ── Win-rate bar ── */
.wr-bar-wrap { margin-top: 4px; }
.wr-bar-track { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
.wr-bar-fill  { height: 100%; border-radius: 4px; transition: width .5s; }
.wr-bar-lbl   { font-size: 11px; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="dot dot-spin" id="dot"></div>
  <h1>⚽ 足球策略訊號</h1>
  <span class="updated" id="updated">載入中...</span>
  <button class="btn-refresh" onclick="fetchData()">更新</button>
</div>

<div class="grid" id="grid">
  <div class="empty"><div style="font-size:32px">⏳</div><p>等待第一次抓取...</p></div>
</div>

<!-- Detail Drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div style="font-size:18px">📊</div>
    <span class="drawer-title" id="drawer-title">策略詳情</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
const REFRESH = 120;
let timer, cd = REFRESH, allData = {};

async function fetchData() {
  clearInterval(timer);
  cd = REFRESH;
  setDot('spin');
  try {
    const r = await fetch('/api/data');
    const j = await r.json();
    allData = j.data?.strategies || {};
    render(j);
  } catch(e) {
    setDot('err');
  }
  startTimer();
}

function render(j) {
  const strategies = j.data?.strategies || {};
  const keys = Object.keys(strategies);
  const grid = document.getElementById('grid');

  if (j.updated_at) {
    document.getElementById('updated').textContent = '更新 ' + j.updated_at;
  }

  if (keys.length === 0) {
    setDot('err');
    grid.innerHTML = '<div class="empty"><p>' + (j.error || '尚無資料') + '</p></div>';
    return;
  }
  setDot(j.status === '正常' ? 'ok' : 'err');

  // 依平均預測勝率排序（高→低）
  keys.sort((a, b) => {
    const wa = calcPredStats(strategies[a]).avg || 0;
    const wb = calcPredStats(strategies[b]).avg || 0;
    return wb - wa;
  });
  grid.innerHTML = keys.map(name => buildCard(name, strategies[name])).join('');
}

/* ────────────── 計算預測勝率統計 ────────────── */
function calcPredStats(page) {
  const nums = [];
  (page?.sections||[]).forEach(sec => {
    (sec.matches||[]).forEach(m => {
      const c2 = m.cols && m.cols[2] ? m.cols[2] : '';
      const n = c2.match(/(\d+)\s*$/);
      if (n) {
        const v = parseInt(n[1]);
        if (v >= 40 && v <= 99) nums.push(v);
      }
    });
  });
  if (!nums.length) return { avg: null, max: null, count: 0, nums };
  const avg = Math.round(nums.reduce((a,b)=>a+b,0)/nums.length);
  const max = Math.max(...nums);
  const high = nums.filter(v=>v>=55).length;
  return { avg, max, count: nums.length, high, nums };
}

/* ────────────── Card ────────────── */
function buildCard(name, page) {
  if (!page || page.error) {
    return `<div class="card" onclick="openDrawer('${esc(name)}')">
      <div class="card-head"><span class="card-name">${esc(name)}</span></div>
      <div class="error-msg">${esc(page?.error || '無資料')}</div>
    </div>`;
  }

  const signals  = collectSignals(page);
  const hasSig   = signals.length > 0;
  const pred     = calcPredStats(page);

  // 預測勝率 badge
  let predHtml;
  if (pred.avg !== null) {
    const cls = pred.avg >= 55 ? 'pred-high' : pred.avg >= 50 ? 'pred-mid' : 'pred-low';
    const maxTag = pred.max > pred.avg
      ? `<span class="pred-max">最高 ${pred.max}%</span>` : '';
    predHtml = `<span class="pred-badge ${cls}">預測 ${pred.avg}% ${maxTag}</span>`;
  } else {
    predHtml = `<span class="pred-badge pred-none">無預測數據</span>`;
  }

  let sigHtml;
  if (hasSig) {
    sigHtml = signals.slice(0, 4).map(s => {
      const wrHtml = s.wr !== null
        ? `<span class="winrate ${s.wr>=60?'wr-high':s.wr>=40?'wr-mid':'wr-low'}">${s.wr}%</span>`
        : '';
      return `<div class="signal-item ${s.type==='warning'?'warn':''}">
        <div class="signal-rec">${esc(s.rec)}${wrHtml}</div>
        <div class="signal-meta">${esc((s.data||'').substring(0,60))}${(s.data||'').length>60?'…':''}</div>
      </div>`;
    }).join('');
    if (signals.length > 4)
      sigHtml += `<div class="signal-meta" style="text-align:center;margin-top:4px">⋯ 另有 ${signals.length-4} 個，點擊查看全部</div>`;
  } else {
    sigHtml = '<div class="no-signal-msg">目前無訊號</div>';
  }

  // 高勝率場次提示（無訊號時也顯示）
  let highHtml = '';
  if (!hasSig && pred.high > 0) {
    highHtml = `<div class="signal-meta" style="color:var(--yellow);text-align:center">
      ⚡ ${pred.high} 場預測 ≥55%，點擊查看詳情</div>`;
  }

  return `<div class="card" onclick="openDrawer('${esc(name)}')">
    <div class="card-head">
      <span class="card-name">${esc(name)}</span>
      ${predHtml}
      <span class="signal-badge ${hasSig?'has-signal':'no-signal'}" style="margin-left:0">
        ${hasSig ? signals.length + ' 個訊號' : '無訊號'}
      </span>
    </div>
    <hr class="card-divider">
    <div class="signal-list">${sigHtml}${highHtml}</div>
    <div class="card-footer">⏱ ${esc(page.scraped_at||'')}　場次：${totalMatches(page)}　預測筆數：${pred.count}</div>
  </div>`;
}

/* ────────────── Drawer ────────────── */
function openDrawer(name) {
  const page = allData[name];
  document.getElementById('drawer-title').textContent = name;
  document.getElementById('drawer-body').innerHTML = buildDetail(name, page);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

function buildDetail(name, page) {
  if (!page || page.error) {
    return `<div class="error-msg">${esc(page?.error || '無資料')}</div>`;
  }

  // ── 統計 ──
  let total = 0, highlighted = 0;
  (page.sections||[]).forEach(sec => {
    (sec.matches||[]).forEach(m => {
      total++;
      if (m.highlight === 'success' || m.highlight === 'warning') highlighted++;
    });
  });

  const pred     = calcPredStats(page);
  const avgWr    = pred.avg;
  const wrColor  = avgWr===null ? '--muted' : avgWr>=55?'--green':avgWr>=50?'--yellow':'--red';
  const sigColor = highlighted>0?'--green':'--muted';

  let statsHtml = `<div class="stat-row">
    <div class="stat-box">
      <div class="stat-num" style="color:var(${sigColor})">${highlighted}</div>
      <div class="stat-lbl">訊號場次</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${total}</div>
      <div class="stat-lbl">總場次</div>
    </div>`;

  if (avgWr !== null) {
    statsHtml += `
    <div class="stat-box">
      <div class="stat-num" style="color:var(${wrColor})">${avgWr}%</div>
      <div class="stat-lbl">平均預測勝率</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" style="color:var(--green)">${pred.max}%</div>
      <div class="stat-lbl">最高預測</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" style="color:var(${pred.high>0?'--green':'--muted'})">${pred.high}</div>
      <div class="stat-lbl">≥55% 場次</div>
    </div>`;
  }
  statsHtml += `</div>`;

  // win-rate bar
  if (avgWr !== null) {
    const barColor = avgWr>=55?'#22c55e':avgWr>=50?'#f59e0b':'#ef4444';
    statsHtml += `<div class="wr-bar-wrap">
      <div class="wr-bar-track"><div class="wr-bar-fill" style="width:${avgWr}%;background:${barColor}"></div></div>
      <div class="wr-bar-lbl">平均預測勝率 ${avgWr}%（共 ${pred.count} 筆，最高 ${pred.max}%）</div>
    </div>`;
  }

  // ── 各 section 表格 ──
  let sectionsHtml = '';
  (page.sections||[]).forEach((sec, si) => {
    if (!sec.matches || sec.matches.length === 0) return;

    // 計算本 section 預測勝率
    let sTotal=0, sHighlight=0;
    const sNums=[];
    sec.matches.forEach(m => {
      sTotal++;
      if (m.highlight==='success'||m.highlight==='warning') sHighlight++;
      const c2 = m.cols && m.cols[2] ? m.cols[2] : '';
      const n = c2.match(/(\d+)\s*$/);
      if (n) { const v=parseInt(n[1]); if(v>=40&&v<=99) sNums.push(v); }
    });
    const sWr = sNums.length>0 ? Math.round(sNums.reduce((a,b)=>a+b,0)/sNums.length) : null;
    const sSigRate = sTotal>0 ? Math.round(sHighlight/sTotal*100) : 0;

    const headerRow = sec.headers && sec.headers.length > 0
      ? `<thead><tr>${sec.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>`
      : '';

    const rows = sec.matches.map(m => {
      const recIdx = m.cols.length - 1;
      const tds = m.cols.map((c, ci) => {
        const cls = ci===recIdx && m.highlight
          ? ` class="rec-${m.highlight}"` : '';
        return `<td${cls}>${esc(c)}</td>`;
      }).join('');
      return `<tr class="${m.highlight?'row-'+m.highlight:''}">${tds}</tr>`;
    }).join('');

    const sWrTag = sWr !== null
      ? `<span style="color:var(${sWr>=55?'--green':sWr>=50?'--yellow':'--red'});font-size:12px;font-weight:700"> · 預測 ${sWr}%</span>`
      : '';
    const sSigTag = sHighlight > 0
      ? `<span style="color:var(--green);font-size:12px"> · ${sHighlight}/${sTotal} 訊號</span>`
      : '';

    sectionsHtml += `<div class="section-block">
      <div class="section-title">${esc(sec.title||('區塊 '+(si+1)))}${sWrTag}${sSigTag}</div>
      <div class="tbl-wrap"><table>${headerRow}<tbody>${rows}</tbody></table></div>
    </div>`;
  });

  if (!sectionsHtml) sectionsHtml = '<div class="no-signal-msg">此策略目前無資料</div>';

  return statsHtml + sectionsHtml;
}

/* ────────────── Helpers ────────────── */
function collectSignals(page) {
  const signals = [];
  (page.sections||[]).forEach(sec => {
    (sec.matches||[]).forEach(m => {
      const rec  = m.cols[m.cols.length-1]||'';
      const data = m.cols[2]||'';
      const wrM  = rec.match(/(\d+\.?\d*)%/)||data.match(/(\d+\.?\d*)%/);
      const wr   = wrM ? parseFloat(wrM[1]) : null;
      if (m.highlight==='success'||m.highlight==='warning')
        signals.push({ rec, data, wr, type: m.highlight });
    });
  });
  return signals;
}

function totalMatches(page) {
  return (page.sections||[]).reduce((n,s) => n+(s.matches||[]).length, 0);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setDot(s) {
  document.getElementById('dot').className =
    'dot '+{ok:'dot-ok',err:'dot-err',spin:'dot-spin'}[s];
}

function startTimer() {
  timer = setInterval(() => {
    cd--;
    const u = document.getElementById('updated');
    const base = u.textContent.split(' (')[0];
    u.textContent = base + ` (${cd}s)`;
    if (cd<=0) { clearInterval(timer); fetchData(); }
  }, 1000);
}

fetchData();
</script>
</body>
</html>
